# =============================================================================
# 太陽能儲能監控系統 - Docker Compose 部署配置
# Solar Energy Storage Management System
# 使用方式：docker compose up -d
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL 資料庫服務
  # ===========================================================================
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: solar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-solar_storage}
      POSTGRES_USER: ${DB_USER:-solar_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solar_secure_password_2024}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-solar_admin} -d ${DB_NAME:-solar_storage}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar-network

  # ===========================================================================
  # NestJS API 後端服務
  # ===========================================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: solar-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DB_NAME:-solar_storage}
      DATABASE_USER: ${DB_USER:-solar_admin}
      DATABASE_PASSWORD: ${DB_PASSWORD:-solar_secure_password_2024}
      JWT_SECRET: ${JWT_SECRET:-solar-storage-jwt-secret-key-change-in-production-2024}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
    networks:
      - solar-network

  # ===========================================================================
  # WebSocket 即時通訊服務
  # ===========================================================================
  websocket:
    build:
      context: ./websocket
      dockerfile: Dockerfile
    container_name: solar-websocket
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8001
    ports:
      - "${WS_PORT:-8001}:8001"
    depends_on:
      - api
    networks:
      - solar-network

  # ===========================================================================
  # React 前端服務（Vite 開發模式，支援熱重載）
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: solar-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:${API_PORT:-8000}
      VITE_WS_URL: ws://localhost:${WS_PORT:-8001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api
    networks:
      - solar-network

  # ===========================================================================
  # Nginx 反向代理（可選，用於統一入口）
  # ===========================================================================
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: solar-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - websocket
      - frontend
    networks:
      - solar-network

# =============================================================================
# 數據卷定義
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# 網路定義
# =============================================================================
networks:
  solar-network:
    driver: bridge
